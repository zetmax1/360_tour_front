server {
    listen 5177 ssl;
    server_name 360.jbnuu.uz;

    root /usr/share/nginx/html;
    index index.html;

    # ── SSL (using existing certificates) ──
    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 500;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Static assets — aggressive caching (content-hashed filenames) ──
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Deny access to hidden files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    client_max_body_size 85M;
}
